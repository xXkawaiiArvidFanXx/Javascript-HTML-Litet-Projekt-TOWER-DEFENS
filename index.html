<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Tvåspelarspel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            display: block;
            border: 4px solid white;
            background-color: #000;
            cursor: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .score {
            color: white;
            font-size: 2em;
            margin-top: 15px;
            font-weight: bold;
        }

        .controls {
            color: white;
            margin-top: 15px;
            font-size: 1.1em;
            line-height: 1.8;
        }

        .player-left {
            color: #66ff99;
        }

        .player-right {
            color: #ff9966;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            font-size: 2em;
            z-index: 100;
            display: none;
            border: 3px solid #FFD700;
        }

        .game-over button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1.2em;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .game-over button:hover {
            background-color: #4b51a2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> PING PONG </h1>
        <div style="position: relative; display: inline-block;">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div id="gameOverScreen" class="game-over">
                <div id="gameOverText"></div>
                <button onclick="location.reload()">Spela igen</button>
            </div>
        </div>
        <div class="score">
            <span class="player-left">Spelare 1: <span id="score1">0</span></span>
            <span style="margin: 0 20px;">|</span>
            <span class="player-right">Spelare 2: <span id="score2">0</span></span>
        </div>
        <div class="controls">
            <p><span class="player-left">Spelare 1 (Vänster):</span> <strong>W</strong> för upp, <strong>S</strong> för ner</p>
            <p><span class="player-right">Spelare 2 (Höger):</span> <strong>Pil upp</strong> och <strong>Pil ner</strong></p>
            <p style="margin-top: 10px; color: #ffff99;">Första till 5 poäng vinner!</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
